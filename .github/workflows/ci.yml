name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: dragons
          POSTGRES_PASSWORD: dragons
          POSTGRES_DB: dragons
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dragons"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run --source migrations
        env:
          DATABASE_URL: postgres://dragons:dragons@localhost:5432/dragons

      - name: Verify sqlx offline data
        run: cargo sqlx prepare --check --workspace
        env:
          DATABASE_URL: postgres://dragons:dragons@localhost:5432/dragons

  client:
    name: Client checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm run test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [rust, client]
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: dragons
          POSTGRES_PASSWORD: dragons
          POSTGRES_DB: dragons
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dragons"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run database migrations
        run: sqlx migrate run
        env:
          DATABASE_URL: postgres://dragons:dragons@localhost:5432/dragons

      - name: Build server
        run: cargo build --release -p server

      - name: Build client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: |
          ./target/release/server &
          sleep 2
        env:
          DATABASE_URL: postgres://dragons:dragons@localhost:5432/dragons
          JWT_SECRET: ci-test-secret
          ASSET_STORAGE_PATH: /tmp/htbd-assets
          BIND_ADDRESS: 0.0.0.0:3000
          CLIENT_DIR: client/dist
          RUST_LOG: info

      - name: Run Playwright tests
        working-directory: client
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: client/test-results/
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [rust, client]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t htbd:latest .
